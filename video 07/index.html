<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Course Enrollment Form</h1>
    <form action="post">
        <div>
            <label for="username">Enter user name: </label>
            <input type="text" name="username" id="username" placeholder="Enter username" autofocus>
        </div>

        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female">
            <label for="female">Female</label>
        </div>

        <div>
            <input type="checkbox" name="subsribe" id="subsribe" value="yes">
            <label for="subsribe">Subscribe to newslater</label>
        </div>

        <div>
            <textarea name="comment" id="comment" rows="4" cols="50">
                Enter your comment here...... 
            </textarea>
        </div>

        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="mango">Mango</option>
            </select>
        </div>
        
    </form>
</body>
</html>
